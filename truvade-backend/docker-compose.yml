services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=change-me-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres
      - POSTGRES_DB=truvade
      - POSTGRES_USER=truvade
      - POSTGRES_PASSWORD=truvade
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=truvade
      - POSTGRES_USER=truvade
      - POSTGRES_PASSWORD=truvade
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truvade"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
